<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Assistant Dashboard</title>
    <meta name="description" content="Read-only Home Assistant monitoring dashboard with glassmorphism dark mode.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="data:,">
</head>
<body>
<div id="app">

    <!-- ══════════ DASHBOARD SCREEN ══════════ -->
    <div id="dashboard-screen" class="hidden">

        <header>
            <div class="header-left">
                <h1>Home Assistant</h1>
            </div>
            <div class="header-right">
                <div id="connection-status" class="status-indicator">Initializing...</div>
                <button id="settings-btn" title="Entity settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button id="kiosk-mode-btn" title="Kiosk / Fullscreen mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Alert bar -->
        <div id="alert-bar"></div>

        <!-- Main content -->
        <main class="dashboard-content">

            <section class="dashboard-section" id="section-favorites" style="display:none;">
                <h2>Favorites</h2>
                <div class="cards-grid" id="favorites-container"></div>
            </section>

            <section class="dashboard-section" id="section-weather" style="display:none;">
                <h2>Weather</h2>
                <div class="cards-grid" id="weather-container"></div>
            </section>

            <section class="dashboard-section" id="section-sensors" style="display:none;">
                <h2>Sensors</h2>
                <div class="cards-grid" id="sensors-container"></div>
            </section>

            <section class="dashboard-section" id="section-lights" style="display:none;">
                <h2>Lights &amp; Switches</h2>
                <div class="cards-grid" id="lights-container"></div>
            </section>

            <section class="dashboard-section" id="section-climate" style="display:none;">
                <h2>Climate</h2>
                <div class="cards-grid" id="climate-container"></div>
            </section>

            <section class="dashboard-section" id="section-other" style="display:none;">
                <h2>Other</h2>
                <div class="cards-grid" id="other-container"></div>
            </section>

        </main>
    </div>

    <!-- ══════════ CONFIG SCREEN ══════════ -->
    <div id="config-screen">
        <div class="config-box">
            <h2>Dashboard Setup</h2>
            <div class="input-group">
                <label for="ha-url">Home Assistant URL</label>
                <input type="text" id="ha-url" placeholder="http://192.168.1.X:8123" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="ha-token">Long-Lived Access Token</label>
                <input type="password" id="ha-token" placeholder="eyJhbG..." autocomplete="off">
            </div>
            <div id="config-error" class="alert-item hidden" style="margin-bottom:15px;"></div>
            <button class="primary" id="save-config-btn" style="width:100%;">Connect</button>
        </div>
    </div>

    <!-- ══════════ SETTINGS MODAL ══════════ -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Visibility Settings</h3>
            </div>
            <div class="modal-body">
                <input type="text" id="modal-search" placeholder="Search entities..." autocomplete="off">
                <div class="entity-filters">
                    <span class="filter-chip active" data-domain="all">All</span>
                    <span class="filter-chip" data-domain="sensor">Sensors</span>
                    <span class="filter-chip" data-domain="light">Lights</span>
                    <span class="filter-chip" data-domain="switch">Switches</span>
                    <span class="filter-chip" data-domain="fan">Fans</span>
                    <span class="filter-chip" data-domain="binary_sensor">Binary</span>
                </div>
                <div id="entity-selection-list"></div>
            </div>
            <div class="modal-footer">
                <button id="close-modal-btn">Cancel</button>
                <button class="primary" id="save-selection-btn">Save</button>
            </div>
            <div class="modal-footer" style="border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.15);">
                <span style="flex:1; font-size: 0.75rem; color: var(--text-secondary); opacity: 0.6;">Backup &amp; Restore Settings</span>
                <button id="export-settings-btn" style="padding: 6px 12px; font-size: 0.75rem;">Export</button>
                <button id="import-settings-btn" style="padding: 6px 12px; font-size: 0.75rem;">Import</button>
                <input type="file" id="import-file-input" class="hidden" accept=".json">
            </div>
        </div>
    </div>

    <!-- Floating Kiosk Exit Button -->
    <button id="exit-kiosk-btn" class="floating-btn hidden" title="Exit Fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
        </svg>
    </button>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
